name: OWASP Security Scan

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: semgrep/semgrep:1.164.0
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Semgrep with OWASP rules
        run: |
          semgrep scan \
            --config .semgrep/ \
            --config "p/owasp-top-ten" \
            --config "p/javascript" \
            --config "p/typescript" \
            --config "p/react" \
            --severity ERROR \
            --error \
            --verbose
        # --config .semgrep/         → Custom rules (owasp-top10, react, nextjs)
        # --config "p/owasp-top-ten" → Semgrep registry OWASP rules (auto-updated)
        # --config "p/javascript"    → Semgrep registry JS rules (auto-updated)
        # --config "p/typescript"    → Semgrep registry TS rules (auto-updated)
        # --config "p/react"         → Semgrep registry React rules (auto-updated)
        # --severity ERROR           → Only report ERROR-level findings (ignore WARNINGs)
        # --error                    → Exit code 1 if findings (fails the job)

  dependencies:
    name: Dependency Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
