rules:
  # ============================================================
  # A01:2021 - Broken Access Control
  # ============================================================

  # ============================================================
  # A02:2021 - Cryptographic Failures
  # ============================================================

  - id: weak-hash-md5
    patterns:
      - pattern-either:
          - pattern: crypto.createHash("md5")
          - pattern: crypto.createHash('md5')
          - pattern: CryptoJS.MD5(...)
    message: >
      MD5 is cryptographically broken and should not be used for security
      purposes. Use SHA-256 or bcrypt for hashing.
      OWASP A02:2021 - Cryptographic Failures.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      owasp: A02:2021
      cwe: CWE-328

  - id: weak-hash-sha1
    patterns:
      - pattern-either:
          - pattern: crypto.createHash("sha1")
          - pattern: crypto.createHash('sha1')
          - pattern: CryptoJS.SHA1(...)
    message: >
      SHA-1 is deprecated for security use. Use SHA-256 or stronger.
      OWASP A02:2021 - Cryptographic Failures.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      owasp: A02:2021
      cwe: CWE-328

  - id: hardcoded-secret-in-code
    patterns:
      - pattern-either:
          - pattern: |
              const $SECRET = "..."
          - pattern: |
              let $SECRET = "..."
          - pattern: |
              var $SECRET = "..."
      - metavariable-regex:
          metavariable: $SECRET
          regex: (?i)(password|secret|apiKey|api_key|token|privateKey|private_key|SECRET_KEY|JWT_SECRET)
    message: >
      Possible hardcoded secret assigned to variable '$SECRET'.
      Use environment variables or a secrets manager.
      OWASP A02:2021 - Cryptographic Failures.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      owasp: A02:2021
      cwe: CWE-798

  # ============================================================
  # A03:2021 - Injection
  # ============================================================

  - id: sql-string-concatenation
    patterns:
      - pattern-either:
          - pattern: $DB.query(`...${...}...`)
          - pattern: $DB.query("..." + ...)
          - pattern: $DB.raw(`...${...}...`)
          - pattern: $DB.raw("..." + ...)
          - pattern: |
              $QUERY = `...${...}...`
              ...
              $DB.query($QUERY)
    message: >
      SQL query built with string concatenation or interpolation.
      Use parameterized queries to prevent SQL injection.
      OWASP A03:2021 - Injection.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      owasp: A03:2021
      cwe: CWE-89

  - id: command-injection-exec
    patterns:
      - pattern-either:
          - pattern: child_process.exec(`...${...}...`)
          - pattern: child_process.exec("..." + ...)
          - pattern: exec(`...${...}...`)
          - pattern: require('child_process').exec(`...${...}...`)
    message: >
      User input may reach child_process.exec, allowing command injection.
      Use child_process.execFile with an argument array instead.
      OWASP A03:2021 - Injection.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      owasp: A03:2021
      cwe: CWE-78

  # ============================================================
  # A04:2021 - Insecure Design
  # ============================================================

  - id: eval-usage
    patterns:
      - pattern-either:
          - pattern: eval(...)
          - pattern: new Function(...)
    message: >
      eval() and new Function() execute arbitrary code and are a major
      security risk. Refactor to avoid dynamic code execution.
      OWASP A04:2021 - Insecure Design.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      owasp: A04:2021
      cwe: CWE-95

  - id: settimeout-string-arg
    patterns:
      - pattern-either:
          - pattern: setTimeout("...", ...)
          - pattern: setInterval("...", ...)
    message: >
      setTimeout/setInterval with a string argument acts like eval().
      Pass a function reference instead.
      OWASP A04:2021 - Insecure Design.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      owasp: A04:2021
      cwe: CWE-95

  # ============================================================
  # A05:2021 - Security Misconfiguration
  # ============================================================

  - id: cors-wildcard-origin
    patterns:
      - pattern-either:
          - pattern: |
              cors({ origin: "*" })
          - pattern: |
              cors({ origin: '*' })
          - pattern: |
              cors({ origin: true })
          - pattern: $RES.setHeader("Access-Control-Allow-Origin", "*")
          - pattern: $RES.setHeader('Access-Control-Allow-Origin', '*')
    message: >
      CORS configured with wildcard or unrestricted origin.
      Whitelist specific origins in production.
      OWASP A05:2021 - Security Misconfiguration.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      owasp: A05:2021
      cwe: CWE-942

  - id: debug-mode-enabled
    patterns:
      - pattern-either:
          - pattern: |
              debug: true
          - pattern: |
              DEBUG = true
          - pattern: |
              NODE_ENV === "development"
    message: >
      Debug mode or development check detected. Ensure this is not
      active in production builds.
      OWASP A05:2021 - Security Misconfiguration.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      owasp: A05:2021
      cwe: CWE-489

  # ============================================================
  # A07:2021 - Identification and Authentication Failures
  # ============================================================

  - id: jwt-no-verify
    patterns:
      - pattern-either:
          - pattern: jwt.decode(...)
    pattern-not: jwt.verify(...)
    message: >
      jwt.decode() does NOT verify the signature. Use jwt.verify()
      to validate tokens before trusting their contents.
      OWASP A07:2021 - Authentication Failures.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      owasp: A07:2021
      cwe: CWE-345

  - id: insecure-cookie-options
    patterns:
      - pattern-either:
          - pattern: |
              { ..., httpOnly: false, ... }
          - pattern: |
              { ..., secure: false, ... }
    message: >
      Cookies should have httpOnly and secure flags set to true.
      httpOnly prevents XSS access, secure ensures HTTPS-only transmission.
      OWASP A07:2021 - Authentication Failures.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      owasp: A07:2021
      cwe: CWE-614

  # ============================================================
  # A08:2021 - Software and Data Integrity Failures
  # ============================================================

  - id: open-redirect
    patterns:
      - pattern-either:
          - pattern: res.redirect($REQ.query.$PARAM)
          - pattern: res.redirect($REQ.body.$PARAM)
          - pattern: res.redirect($REQ.params.$PARAM)
    message: >
      Redirecting to a URL from user input without validation enables
      open redirect attacks. Validate against an allowlist of URLs.
      OWASP A08:2021 - Software and Data Integrity Failures.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      owasp: A08:2021
      cwe: CWE-601

  # ============================================================
  # A09:2021 - Security Logging and Monitoring Failures
  # ============================================================

  - id: logging-sensitive-data
    patterns:
      - pattern-either:
          - pattern: console.log(..., $OBJ.password, ...)
          - pattern: console.log(..., $OBJ.token, ...)
          - pattern: console.log(..., $OBJ.secret, ...)
          - pattern: console.log(..., $OBJ.apiKey, ...)
          - pattern: console.log(..., $OBJ.creditCard, ...)
          - pattern: |
              console.log(`...password...`)
          - pattern: |
              console.log(`...token...`)
    message: >
      Sensitive data (passwords, tokens, secrets) should never appear in logs.
      OWASP A09:2021 - Security Logging and Monitoring Failures.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      owasp: A09:2021
      cwe: CWE-532

  # ============================================================
  # A10:2021 - Server-Side Request Forgery (SSRF)
  # ============================================================

  - id: ssrf-fetch-user-input
    patterns:
      - pattern-either:
          - pattern: fetch($REQ.query.$URL)
          - pattern: fetch($REQ.body.$URL)
          - pattern: fetch($REQ.params.$URL)
          - pattern: axios.get($REQ.query.$URL)
          - pattern: axios.get($REQ.body.$URL)
          - pattern: axios.post($REQ.body.$URL, ...)
    message: >
      URL from user input passed directly to HTTP client.
      Validate and whitelist allowed URLs to prevent SSRF.
      OWASP A10:2021 - Server-Side Request Forgery.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      owasp: A10:2021
      cwe: CWE-918
